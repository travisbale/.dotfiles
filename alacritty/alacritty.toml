# Alacritty Configuration

[general]
import = ["~/.config/alacritty/onedark.toml"]
live_config_reload = true

[window]
opacity = 0.78
padding = { x = 5, y = 5 }
decorations = "full"
title = "Terminal"

[window.dimensions]
columns = 140
lines = 35

[scrolling]
history = 10000

[font]
size = 10.0

[font.normal]
family = "DroidSansMono Nerd Font"

[cursor]
style = { shape = "Block", blinking = "Off" }

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true
